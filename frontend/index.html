<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Family Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #a8edea, #fed6e3);
      font-family: 'Poppins', 'Times New Roman', serif,;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }
    header {
      background-color: #4caf50;
      color: white;
      padding: 15px 0;
      width: 100%;
      font-size: 32px;
      border-bottom: 5px solid #388e3c;
    }
    form {
      background: #ffffff;
      padding: 30px;
      width: 85%;
      max-width: 900px;
      margin: 40px auto;
      border-radius: 15px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }
    h3, h4 {
      color: #333;
    }
    .form-section {
      padding: 20px;
      margin-bottom: 20px;
      border-left: 5px solid #4caf50;
      background: #f9f9f9;
      border-radius: 10px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: 500;

    }
    input, select, textarea {
      width: 60%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #a27373;
      border-radius: 6px;
      font-size: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
      gap: 15px;
    }
    textarea {
      resize: vertical;
    }
    .gender-options {
      display: flex;
      gap: 20px;
      margin-top: 5px;
      justify-content: center;
      align-items: center;
    }
    .profile-pic-container {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }
    .profile-pic-container input[type="file"] {
      display: none;
    }
    .profile-label {
      background-image: url('https://cdn-icons-png.flaticon.com/512/149/149071.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      width: 150px;
      height: 150px;
      border: 3px dashed #aaa;
      border-radius: 50%;
      cursor: pointer;
    }
    .checkbox-section {
      align-items: center;
      gap: 1px;
      margin-top: 10px;
      justify-content:right;
      text-align: center;
      display: block;
    }

    .error-message {
      color: red;
      font-size: 14px;
      text-align: left;
      width: 90%;
      margin: auto;
    }
.add-member-btn {
  background-color: #2196f3;
  color: white;
  border: none;
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
  margin: 20px auto;
  display: block;
  transition: background-color 0.3s;
}

.add-member-btn:hover {
  background-color: #0dac47;
}

.remove-btn {
  background-color: #e53935;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  float: right;
  margin-top: -10px;
  margin-bottom: 10px;
}

.remove-btn:hover {
  background-color: #c62828;
}


button[type="submit"] {
  background-color: #9c1414;
  color: white;
  border: none;
  padding: 14px 30px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 30px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
  transition: background-color 0.3s, transform 0.2s;

}

button[type="submit"]:hover {
  background-color: #388e3c;
  transform: scale(1.13);
}



  </style>
</head>
<body>
  <header>
    <marquee behavior="scroll" direction="left">Welcome to Family Registration Portal</marquee>
  </header>

  <form    action="/submit-form" method="POST" enctype="multipart/form-data"  onsubmit="return validateForm(event);"  novalidate>
    <div class="form-section">
      <h3 style="color: #b73c0b;">Personal Information</h3>

      <div class="profile-pic-container">
        <input type="file" id="profile"   name="files"  accept="image/*" onchange="loadProfileImage(this)" required>

        <label for="profile" class="profile-label" id="profileImage"></label>
      </div>
      <span id="error-profile" class="error-message"></span>

      <label for="familyHead">Name Of Family Head:</label>
      <input type="text" id="headName" name="familyHead" required>
      <span id="error-headName" class="error-message"></span>

      <label>Gender:</label>
      <div class="gender-options">
        <label><input type="radio" name="gender" value="Male" checked> Male</label>
        <label><input type="radio" name="gender" value="Female"> Female</label>
      </div>

      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" name="dob" required>
      <span id="error-dob" class="error-message"></span>

      <label>Phone Number:</label>
      <input type="tel" id="phone" name="phone"  placeholder="Enter your phone number...">
      <span id="error-phone" class="error-message"></span>

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" placeholder="Enter your email id..." required>
      <span id="error-email" class="error-message"></span>


    <label for="city">City:</label>
    <select id="city" name="city" onchange="updateLocalities()">
       <option value="">Select City</option>
      <option value="jaipur">Jaipur</option>
      <option value="Chittorgarh">Chittorgarh</option>
    </select>
    <span id="error-city" class="error-message"></span>

    <label for="locality">Locality:</label>
    <select id="locality" name="locality">
    <option value="">Select Locality</option>
    </select>
    <span id="error-locality" class="error-message"></span>

      <label>Occupation:</label>
      <input type="text" id="occupation" name="occupation[]" placeholder="Enter your occupation...">
      <span id="error-occupation" class="error-message"></span>

      <label>Gotra:</label>
      <input type="text" id="gotra" name="gotra" placeholder="Enter your gotra...">
      <span id="error-gotra" class="error-message"></span>

      <label>Native Place:</label>
      <input type="text" id="nativePlace" name="nativePlace" placeholder=" Enter your native place...">
      <span id="error-native" class="error-message"></span>

     <label for="bloodGroup">Blood Group:</label>
     <select id="bloodGroup" name="bloodGroup[]" required>
      <option value="">Select</option>
      <option value="A+">A+</option><option value="A-">A-</option>
      <option value="B+">B+</option><option value="B-">B-</option>
      <option value="O+">O+</option><option value="O-">O-</option>
      <option value="AB+">AB+</option><option value="AB-">AB-</option>
    </select>
    <span id="error-bloodGroup" class="error-message"></span>


      <label>Full Address:</label>
      <textarea id="address" name="address"  placeholder="Enter your full address..."></textarea>
      <span id="error-address" class="error-message"></span>
    </div>

<div id="member-wrapper" class="form-section">
  <h3 style="color: #2910b7;">Family Member Details:</h3>
</div>
<button type="button" class="add-member-btn" onclick="addFamilyMember()">+ Add Member</button>



    <div class="checkbox-section">
      <input type="checkbox" id="confirmCheck"> 
      
      <label for="confirmCheck">I confirm all information is accurate.</label>
    </div>
    <span id="error-confirm" class="error-message"></span>

    <button type="submit">Submit</button>
  </form>

  <script>
    function validateForm() {
      let isValid = true;

      function showError(id, message) {
        document.getElementById(id).textContent = message;
        isValid = false;
      }

      function clearError(id) {
        document.getElementById(id).textContent = '';
      }

      const profile = document.getElementById("profile");
      if (!profile.files.length) showError("error-profile", "Please upload a profile image.");
      else clearError("error-profile");

      const name = document.getElementById("headName").value.trim();
      if (!/^[A-Za-z\s]+$/.test(name)) showError("error-headName", " Please fill your name of family head.");
      else clearError("error-headName");

      const dob = document.getElementById("dob").value;
      const dobDate = new Date(dob);
      const minDOB = new Date("1970-01-01");
      const maxDOB = new Date("2025-06-01");
      if (!dob || dobDate < minDOB || dobDate > maxDOB) showError("error-dob", "DOB must be between 01-01-1970 and 01-06-2025.");
      else clearError("error-dob");

      const phone = document.getElementById("phone").value.trim();
      if (!/^[6789]\d{9}$/.test(phone)) showError("error-phone", "Enter valid 10-digit phone starting with 6/7/8/9.");
      else clearError("error-phone");

      const email = document.getElementById("email").value.trim();
      if (!email.includes("@")) showError("error-email", "Please enter a valid email.");
      else clearError("error-email");

      const city = document.getElementById("city").value;
      if (!city) showError("error-city", "Please select your city.");
      else clearError("error-city");

      const locality = document.getElementById("locality").value;
      if (!locality) showError("error-locality", "Please select your locality.");
      else clearError("error-locality");

      const occupation = document.getElementById("occupation").value.trim();
      if (!occupation) showError("error-occupation", "Please enter your occupation.");
      else clearError("error-occupation");

      const gotra = document.getElementById("gotra").value.trim();
      if (!gotra) showError("error-gotra", "Please enter your gotra.");
      else clearError("error-gotra");

      const native = document.getElementById("nativePlace").value.trim();
      if (!native) showError("error-native", "Please enter your native place.");
      else clearError("error-native");

      const bloodGroup = document.getElementById("bloodGroup").value;
      if (!bloodGroup) showError("error-bloodGroup", "Please select your blood group.");
      else clearError("error-bloodGroup");
      

      const address = document.getElementById("address").value.trim();
      if (!address) showError("error-address", "Please enter your full address.");
      else clearError("error-address");

      const check = document.getElementById("confirmCheck");
      if (!check.checked) showError("error-confirm", "Please confirm before submitting.");
      else clearError("error-confirm");





// ✅ Dynamic Family Member Validation
  for (let i = 1; i <= memberCount; i++) {
    const name = document.getElementById(`member-name${i}`).value.trim();
    const relation = document.getElementById(`member-relation${i}`).value;
    const age = document.getElementById(`member-age${i}`).value.trim();
    const gender = document.getElementById(`member-gender${i}`).value;
    const qualification = document.getElementById(`member-qualification${i}`).value;
    const blood = document.getElementById(`member-bloodGroup${i}`).value;

    if (!name) {
      showError(`error-member-name${i}`, "Enter name");
    } else {
      clearError(`error-member-name${i}`);
    }

    if (!relation) {
      showError(`error-member-relation${i}`, "Enter relation");
    } else {
      clearError(`error-member-relation${i}`);
    }

    if (!age || isNaN(age) || age <= 0) {
      showError(`error-member-age${i}`, "Enter valid age");
    } else {
      clearError(`error-member-age${i}`);
    }

    if (!gender) {
      showError(`error-member-gender${i}`, "Select gender");
    } else {
      clearError(`error-member-gender${i}`);
    }

    if (!qualification) {
      showError(`error-member-qualification${i}`, "Select qualification");
    } else {
      clearError(`error-member-qualification${i}`);
    }

    if (!blood) {
      showError(`error-member-bloodGroup${i}`, "Select blood group");
    } else {
      clearError(`error-member-bloodGroup${i}`);
    }
  }
      return isValid;
    }

let memberId = 0;
let memberCount=0;
function addFamilyMember() {
  memberId++;
  const wrapper = document.getElementById("member-wrapper");

  const div = document.createElement("div");
  div.className = "form-section";
  div.setAttribute("id", "member-" + memberId);
  div.innerHTML = `
    <button type="button" class="remove-btn" onclick="removeMember('member-${memberId}')">Remove</button>
    <h4>Member #${memberId}</h4>

    <label>Enter the name of family member:</label>
    <input type="text" name="member-name[]" id="member-name${memberCount}" placeholder="Enter the name of family member..." required>
      <span id="error-member-name${memberCount}" class="error-message"></span>

    <label for="member-relation">Relation:</label>
    <select name="relation[]" id="member-relation${memberCount}" required>
      <option value="">Select Relation</option>
        <option value="Father">Father</option>
        <option value="Mother">Mother</option>
        <option value="Brother">Brother</option>
        <option value="Sister">Sister</option>
        <option value="Wife">Wife</option>
        <option value="Son">Son</option>
        <option value="Uncle">Uncle</option>
        <option value="Sibling">Sibling</option>
        <option value="grand child">Grand child</option>
        <option value="Grand parent">Grand parent</option>
        <option value="Daughter in law">Daughter in law</option>
        <option value="aunt">Aunt</option>
       <option value="Neohew">Nephew</option>
        <option value="Miece">Niece</option>
        <option value="Cousion">Cousin</option>
        <option value="Other">other</option>
    </select>
      <span id="error-member-relation${memberCount}" class="error-message"></span>



    <label>Age:</label>
    <input type="number" name="age[]" min="0" id="member-age${memberCount}" required>
      <span id="error-member-age${memberCount}" class="error-message"></span>


      <select id="member-gender${memberCount}">
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <span id="error-member-gender${memberCount}" class="error-message"></span>

    <label for="member-marital-status">Marital Status:</label>
    <select name="maritalStatus[]" id="member-marital-status${memberCount}" required>
      <option value="">Select</option>
      <option value="Unmarried">Unmarried</option>
      <option value="Married">Married</option>
      <option value="Widowed">Widowed</option>
      <option value="Divorced">Divorced</option>
    </select>
      <span id="error-member-marital-status${memberCount}" class="error-message"></span>

    <label for="member-bloodGroup">Blood Group:</label>
    <select name="bloodGroup[]"  id="member-bloodGroup${memberCount}" required>
      <option value="">Select</option>
      <option value="A+">A+</option><option value="A-">A-</option>
      <option value="B+">B+</option><option value="B-">B-</option>
      <option value="O+">O+</option><option value="O-">O-</option>
      <option value="AB+">AB+</option><option value="AB-">AB-</option>
    </select>
      <span id="error-member-bloodGroup${memberCount}" class="error-message"></span>

    <label for="member-qualification">Qualification:</label>
    <select name="qualification[]" id="member-qualification${memberCount}" required>
      <option value="">Select</option>
      <option value="Illiterate">Illiterate</option>
      <option value="Below 10th">Below 10th</option>
      <option value="Matriculation (10th)">Matriculation (10th)</option>
      <option value="Higher Secondary(10+2)">Higher Secondary (10+2)</option>
      <option value="Diploma">Diploma</option>
      <option value="Graduation">Graduation</option>
      <option value="Post Graduation">Post Graduation</option>
      <option value="Ph.D">Ph.D</option>
    </select>
    <span id="error-member-quaification${memberCount}" class="error-message"></span>

    <label>Occupation:</label>
    <input type="text" name="occupation[]">
  `;
  wrapper.appendChild(div);
}

function removeMember(id) {
  const element = document.getElementById(id);
  if (element) {
    element.remove();
  }
}

 const localityOptions = {
      jaipur: ["Vaishali Nagar", "Malviya Nagar", "Mansarovar", "Jagatpura", "C-Scheme"],
      Chittorgarh: ["Chanderiya","Gandhi Chowk", "Gangrar", "Bhilwara", "Rajendra Nagar", "Pratap Nagar","Hamirgarh"]
    };

    function updateLocalities() {
      const city = document.getElementById("city").value;
      const localitySelect = document.getElementById("locality");

      // Clear current options
      localitySelect.innerHTML = '<option value="">Select Locality</option>';

      // Add new locality options based on city
      if (localityOptions[city]) {
        localityOptions[city].forEach(locality => {
          const option = document.createElement("option");
          option.value = locality.toLowerCase().replace(/\s/g, "-");
          option.text = locality;
          localitySelect.appendChild(option);
        });
      }
    }


    // profile image
    function loadProfileImage(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function (e) {
        const preview = document.getElementById('profileImage');
        preview.style.backgroundImage = `url('${e.target.result}')`;
        preview.style.backgroundSize = "cover";
        preview.style.backgroundPosition = "center";
        preview.style.border = "none";
      };
      reader.readAsDataURL(input.files[0]);
    }}


  // backend part
function submitForm(event) {
  event.preventDefault();

  const form = document.querySelector('form');
  const formData = new FormData(form);

  // Collect dynamic member data
  const members = [];
  document.querySelectorAll('#member-wrapper .form-section').forEach(section => {
    const name = section.querySelector('input[name="memberName[]"]').value;
    const relation = section.querySelector('input[name="relation[]"]').value;
    const age = section.querySelector('input[name="age[]"]').value;
    const maritalStatus = section.querySelector('select[name="maritalStatus[]"]').value;
    const bloodGroup = section.querySelector('select[name="bloodGroup[]"]').value;
    const qualification = section.querySelector('select[name="qualification"]').value;
    const occupation = section.querySelector('input[name="occupation[]"]').value;
    
    members.push({ name, relation, age, maritalStatus, bloodGroup, qualification, occupation });
  });

  formData.append('members', JSON.stringify(members));

  fetch('http://localhost:5000/submit', {
    method: 'POST',
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    alert(data.message || 'Submitted!');
    form.reset();
  })
  .catch(error => {
    console.error('Error:', error);
    alert('Error submitting form.');
  });

  return false;
}
  </script>
</body>
</html>
